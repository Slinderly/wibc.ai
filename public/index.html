<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wibc.ai - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-msg { color: #ff5c5c; margin-top: 10px; font-size: 0.84rem; text-align: center; }
        .success-msg { color: #22c55e; margin-top: 10px; font-size: 0.84rem; text-align: center; }
        .auth-bg {
            position: relative;
            overflow: hidden;
        }
        .auth-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% -15%, rgba(157,78,221,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 90% 100%, rgba(60,9,108,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 5% 80%, rgba(157,78,221,0.1) 0%, transparent 55%);
            pointer-events: none;
        }
        .brand-tagline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 1.8rem;
        }
        .brand-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
        }
        .brand-tagline span {
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
        }
    </style>
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card glassmorphism">
            <h1 class="logo">wibc<span class="highlight">.ai</span></h1>
            <div class="brand-tagline">
                <div class="brand-dot"></div>
                <span>Bot de ventas con IA</span>
                <div class="brand-dot"></div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
            </div>

            <!-- Panel Login -->
            <div class="auth-panel active" id="panelLogin">
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginUsername">Usuario</label>
                        <input type="text" id="loginUsername" required placeholder="tu-usuario" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Contraseña</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary">Ingresar</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
            </div>

            <!-- Panel Registro -->
            <div class="auth-panel" id="panelRegister">
                <form id="registerForm">
                    <div class="input-group">
                        <label for="regUsername">Nombre de usuario</label>
                        <input type="text" id="regUsername" required placeholder="elige-un-usuario" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="regPassword">Contraseña</label>
                        <input type="password" id="regPassword" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary">Crear cuenta</button>
                    <div id="registerError" class="error-msg"></div>
                    <div id="registerSuccess" class="success-msg"></div>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/auth.js?v=3"></script>
</body>
</html>
