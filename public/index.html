<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wibc.ai - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos rápidos para asegurar que el QR se vea bien */
        #qrSection {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .status-badge {
            font-size: 0.9rem;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card glassmorphism">
            <h1 class="logo">wibc<span class="highlight">.ai</span></h1>
            <p class="subtitle" id="mainSubtitle">Controla tu bot de ventas con IA</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required placeholder="tu-usuario">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">Ingresar / Registrar</button>
                <div id="loginError" class="error-msg" style="color: #ff4d4d; margin-top: 10px; font-size: 0.85rem;"></div>
            </form>


        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/auth.js?v=2"></script>
</body>
</html>
