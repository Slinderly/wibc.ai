<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wibc.ai - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-tabs {
            display: flex;
            gap: 6px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 1.8rem;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }
        .auth-panel { display: none; }
        .auth-panel.active { display: block; }
        .error-msg { color: #ff4d4d; margin-top: 10px; font-size: 0.85rem; text-align: center; }
        .success-msg { color: #22c55e; margin-top: 10px; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card glassmorphism">
            <h1 class="logo">wibc<span class="highlight">.ai</span></h1>
            <p class="subtitle">Controla tu bot de ventas con IA</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
            </div>

            <!-- Panel Login -->
            <div class="auth-panel active" id="panelLogin">
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginUsername">Usuario</label>
                        <input type="text" id="loginUsername" required placeholder="tu-usuario">
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Contraseña</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Ingresar</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
            </div>

            <!-- Panel Registro -->
            <div class="auth-panel" id="panelRegister">
                <form id="registerForm">
                    <div class="input-group">
                        <label for="regUsername">Usuario</label>
                        <input type="text" id="regUsername" required placeholder="elige-un-usuario">
                    </div>
                    <div class="input-group">
                        <label for="regPassword">Contraseña</label>
                        <input type="password" id="regPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Crear cuenta</button>
                    <div id="registerError" class="error-msg"></div>
                    <div id="registerSuccess" class="success-msg"></div>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/auth.js?v=3"></script>
</body>
</html>
